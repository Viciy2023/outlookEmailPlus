name: Keep HF Space Awake

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  ping-healthz:
    runs-on: ubuntu-latest
    concurrency:
      group: keep-hf-awake-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Ping HF Space healthz with retries
        shell: bash
        env:
          HF_HEALTHZ_URL: https://ccy2026-outlookemailplus-manager.hf.space/healthz
        run: |
          echo "Pinging ${HF_HEALTHZ_URL}"
          curl --fail --silent --show-error \
            --location \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            "${HF_HEALTHZ_URL}"
