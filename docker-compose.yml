version: "3.9"

# ⚠️ 注意：此文件为开发测试用配置，使用本地构建的镜像（outlook-email-dev:latest）
# Watchtower 对本地构建镜像无法执行自动更新，一键更新功能需使用生产 docker-compose 配置
# 生产部署请参考 README.md 中的 docker-compose 示例（使用 guangshanshui/outlook-email-plus 镜像）

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: outlook-email-dev:latest
    container_name: outlook-email-dev
    ports:
      - "5001:5000"
    environment:
      # Flask 核心配置
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env}"
      LOGIN_PASSWORD: "admin123"
      ALLOW_LOGIN_PASSWORD_CHANGE: "true"

      # 运行模式
      FLASK_ENV: "production"
      SCHEDULER_AUTOSTART: "true"

      # 数据库路径（挂载本地真实数据库）
      DATABASE_PATH: "/app/data/outlook_accounts.db"

      # 临时邮箱配置（可按需修改）
      GPTMAIL_BASE_URL: "https://mail.chatgpt.org.uk"
      GPTMAIL_API_KEY: "gpt-test"

      # 一键更新配置（应用读取环境变量作为 fallback，优先使用数据库配置）
      WATCHTOWER_HTTP_API_TOKEN: "${WATCHTOWER_HTTP_API_TOKEN:-}"
      
      # Docker API 自更新配置（可选，高级功能）
      # ⚠️ 警告：启用后容器可通过 Docker API 控制宿主机其他容器，存在安全风险
      # 仅在需要使用 Docker API 自更新功能时启用（默认 false）
      DOCKER_SELF_UPDATE_ALLOW: "${DOCKER_SELF_UPDATE_ALLOW:-false}"

    volumes:
      # 挂载本地真实数据库目录（确保本地 Flask 服务已停止，避免 SQLite 锁冲突）
      - ./data:/app/data
      - ./.runtime:/app/.runtime
      
      # Docker socket 挂载（可选，仅用于 Docker API 自更新功能）
      # ⚠️ 警告：挂载 docker.sock 会授予容器完全的 Docker API 访问权限，请谨慎使用
      # 如需使用 Docker API 自更新功能，请取消下面一行的注释
      # - /var/run/docker.sock:/var/run/docker.sock

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request as u; u.urlopen('http://localhost:5000/healthz', timeout=4).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    networks:
      - outlook-net

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Watchtower HTTP API Token（必须配置，否则容器启动失败）
      # 如果 .env 中未设置 WATCHTOWER_HTTP_API_TOKEN，使用默认的安全随机值
      # 生产环境请在 .env 中设置强随机 Token
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-default-watchtower-token-please-change-in-production}
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_CLEANUP=true
      # 禁用定时轮询，仅通过 HTTP API 触发
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=false
    command: --http-api-update --label-enable
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - outlook-net

networks:
  outlook-net:
    driver: bridge
