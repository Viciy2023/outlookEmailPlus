version: "3.9"

# 热更新模拟测试：使用 latest 镜像启动，验证 Watchtower 更新到最新版本
# 使用方式：docker-compose -f docker-compose.hotupdate-test.yml up -d
# 注意：此文件仅供开发测试使用，请勿用于生产环境

services:
  app:
    image: guangshanshui/outlook-email-plus:latest
    container_name: outlook-hotupdate-test
    ports:
      - "5002:5000"
    environment:
      SECRET_KEY: "${SECRET_KEY:-please-change-this-secret-key-for-testing}"
      LOGIN_PASSWORD: "admin123"
      FLASK_ENV: "production"
      SCHEDULER_AUTOSTART: "true"
      DATABASE_PATH: "/app/data/outlook_accounts.db"
      WATCHTOWER_HTTP_API_TOKEN: "${WATCHTOWER_HTTP_API_TOKEN:-test-hotupdate-token}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request as u; u.urlopen('http://localhost:5000/healthz', timeout=4).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - test-net

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-test
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-test-hotupdate-token}
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=false
    command: --http-api-update --label-enable --debug
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
